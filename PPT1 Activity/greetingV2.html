  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", sans-serif;
      background-image: url('Nekochan.gif');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: #dedede;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      backdrop-filter: brightness(0.9);
    }

    h1 {
      background-color: rgba(255, 255, 255, 0);
      display: inline-block;
      padding: 20px 40px;
      border-radius: 12px;
      font-size: 2.5em;
      color: #ca18f7;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
      margin-bottom: 20px;
    }

    .highlight {
      color: #b010dc;
      font-weight: bold;
    }

    p {
      background-color: rgba(255, 255, 255, 0);
      display: inline-block;
      padding: 15px 30px;
      border-radius: 10px;
      font-size: 1.3em;
      line-height: 1.6;
    }

    .program {
      color: #722ad2;
      font-weight: bold;
    }

    footer {
      position: absolute;
      bottom: 10px;
      width: 100%;
      text-align: center;
      font-size: 0.9em;
      color: #bf31c6;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
    }

    .social-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .social-links a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      text-decoration: none;
      cursor: pointer;
    }

    .social-links a:hover {
      transform: scale(1.2);
      background-color: rgba(185, 46, 223, 0.444);
    }

    .social-links a svg {
      width: 28px;
      height: 28px;
      transition: fill 0.3s ease;
    }

    .social-links a:hover svg {
      filter: brightness(1.2);
    }

    @media (max-width: 600px) {
      .social-links {
        gap: 15px;
      }

      .social-links a {
        width: 40px;
        height: 40px;
      }

      .social-links a svg {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
