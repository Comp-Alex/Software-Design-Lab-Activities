<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poem Page</title>

    <style>
        body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", sans-serif;
        background-image: url('TreeBackground.jpg');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        color: #f22727;
        text-align: center;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        }

        .poem-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        backdrop-filter: brightness(0.9);
        }

        .poem-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #000000; /*  Black border */
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
        }

        h1 {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fd2b18; /* red */
            margin-bottom: 15px;
        }
        h2 {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fa3333; /* lighter red */
            margin-bottom: 15px;
        }

        p {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 10px
        }
    </style>
</head>

<body>

    <div class="poem-container">
        <h1>A Lovely Tree</h1>

        <p>
            <h2>I think that I shall never see,</h2>
            a poem as lovely as a tree.<br>
            <h2>A tree whose hungry mouth is pressed</h2>
            Against the Earth’s sweet flowing breast.
        </p>
    </div>

</body>
</html>
