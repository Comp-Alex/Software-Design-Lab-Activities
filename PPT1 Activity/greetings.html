<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Web Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000; /* Black background */
            color: #fff;
        }

        .container {
            text-align: center;
            padding: 100px 20px;
        }

        h1 {
            color: orange;
            font-size: 48px;
            margin-bottom: 20px;
        }

        h2 {
            color: #fff;
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            margin: 10px 0;
        }

        .highlight {
            color: orange;
            font-weight: bold;
        }

        .card {
            background-color: #111;
            border: 2px solid orange;
            border-radius: 10px;
            padding: 30px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 0 20px rgba(255, 165, 0, 0.3);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            background-color: #111;
            color: orange;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h1>Welcome to my page!</h1>

            <h2>I'm <span class="highlight">Alexandeer John C. Balagso</span></h2>

            <p>A BS Computer Engineering from University of Batangas.</p>

            <p>And I love <span class="highlight">Creating Web Pages :)</span></p>
        </div>
    </div>

    <footer>
        © 2026 | Designed with The Hub Theme
    </footer>

</body>
</html>
